apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: hpa-demo
  namespace: autoscaling

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: hpa-demo

  minReplicas: 1

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 50
