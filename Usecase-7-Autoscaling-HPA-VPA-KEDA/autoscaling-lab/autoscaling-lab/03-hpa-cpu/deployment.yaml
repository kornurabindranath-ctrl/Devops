apiVersion: apps/v1
kind: Deployment

metadata:
  name: hpa-demo
  namespace: autoscaling

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hpa-demo

  template:

    metadata:
      labels:
        app: hpa-demo

    spec:

      containers:

      - name: php-apache

        image: registry.k8s.io/hpa-example

        ports:

        - containerPort: 80

        resources:

          requests:
            cpu: 200m

          limits:
            cpu: 500m
