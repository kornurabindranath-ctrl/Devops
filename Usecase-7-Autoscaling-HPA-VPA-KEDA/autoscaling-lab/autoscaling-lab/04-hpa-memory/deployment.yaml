apiVersion: apps/v1
kind: Deployment

metadata:
  name: memory-demo
  namespace: autoscaling

spec:
  replicas: 1

  selector:
    matchLabels:
      app: memory-demo

  template:

    metadata:
      labels:
        app: memory-demo

    spec:

      containers:

      - name: memory-demo

        image: polinux/stress

        command:
        - stress

        args:
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "150M"
        - "--vm-hang"
        - "1"

        resources:

          requests:
            memory: 100Mi
            cpu: 100m

          limits:
            memory: 300Mi
            cpu: 500m
