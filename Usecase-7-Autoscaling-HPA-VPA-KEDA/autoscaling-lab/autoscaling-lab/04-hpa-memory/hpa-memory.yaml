apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: memory-demo
  namespace: autoscaling

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: memory-demo

  minReplicas: 1

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: memory

      target:

        type: Utilization

        averageUtilization: 70
