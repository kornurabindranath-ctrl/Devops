apiVersion: apps/v1
kind: Deployment

metadata:
  name: inflate

spec:
  replicas: 30

  selector:
    matchLabels:
      app: inflate

  template:
    metadata:
      labels:
        app: inflate

    spec:
      terminationGracePeriodSeconds: 0

      containers:
      - name: pause
        image: public.ecr.aws/eks-distro/kubernetes/pause:3.7

        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
