apiVersion: apps/v1

kind: Deployment

metadata:
  name: inflate

spec:
  replicas: 50

  selector:
    matchLabels:
      app: inflate

  template:
    metadata:
      labels:
        app: inflate

    spec:
      containers:

      - name: pause

        image: public.ecr.aws/eks-distro/kubernetes/pause:3.7

        resources:
          requests:
            cpu: 1
            memory: 1Gi
