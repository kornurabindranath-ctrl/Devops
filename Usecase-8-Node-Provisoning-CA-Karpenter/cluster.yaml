apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: autoscaling-lab
  region: us-east-1
  version: "1.33"

iam:
  withOIDC: true

managedNodeGroups:

  - name: workers

    instanceType: t3.medium

    desiredCapacity: 2

    minSize: 2

    maxSize: 10

    volumeSize: 50

    labels:
      role: worker
